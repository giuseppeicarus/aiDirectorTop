# CinematicAI Studio — Default Configuration
# Copy to ~/.cinematic-studio/config.yaml and customize

app:
  version: "1.0.0"
  data_dir: "~/.cinematic-studio"
  log_level: "INFO"  # DEBUG|INFO|WARNING|ERROR
  backend_port: 8765

# ─── LLM Configuration ────────────────────────────────────────────────────────
# Per-role overrides (se vuoto, tutti i ruoli usano la config `llm` principale)
llm_roles: {}
# Esempio: llm_roles: {story_analyst: {provider: openai, model: gpt-4o, temperature: 0.85}}

llm:
  provider: "lmstudio"          # openai|anthropic|ollama|lmstudio|groq
  model: "google/gemma-3n-e4b"
  api_key: "${OPENAI_API_KEY}"  # use env var or paste key directly
  base_url: http://192.168.1.2:8083/v1              # override for local models (e.g. http://localhost:1234/v1)
  temperature: 0.7
  max_tokens: 4096
  timeout_sec: 120
  retry_attempts: 3
  retry_delay_sec: 2.0

# ─── ComfyUI Nodes ────────────────────────────────────────────────────────────
comfyui:
  nodes:
    - host: "localhost"
      port: 8188
      name: "Local GPU"
      enabled: true
      primary: true
      # auth: null  # set to "user:password" if ComfyUI has auth

  # Parallelism limits (set to number of GPU nodes you have)
  max_parallel_frame_jobs: 1   # txt2img jobs in parallel per node
  max_parallel_video_jobs: 1   # img2video jobs in parallel per node

  # AI Tools — workflow predefiniti (se il selettore WF è su "Default")
  img2video_workflow: "ltx_img2video"              # ltx_2_3_Image_To_Video.json (senza LoadAudio)
  img_audio2video_workflow: "ltx_img_audio2video"  # con traccia audio esterna

# Trailer Generator — workflow canonici in base_workflow_comfyui/
trailer:
  txt2img_workflow: "z_image_txt2img"           # z-image_Text_To_Image.json
  img2video_workflow: "ltx_img_audio2video"     # trailer/music video con audio
  clip_backend: "auto"                          # auto | comfyui | ffmpeg
  allow_ffmpeg_fallback: true                   # false = solo LTX, errore se ComfyUI down

  # Timeouts
  queue_timeout_sec: 30
  execution_timeout_sec: 600   # seconds per job (increase for slow models)
  websocket_recv_timeout_sec: 10

  # Default models (must match what's installed in ComfyUI)
  models:
    checkpoint: "v1-5-pruned-emaonly.ckpt"  # change to your model
    vae: null  # null = use checkpoint's built-in VAE
    video: "wan2.1_i2v_480p.safetensors"   # img2video model

# ─── Output Settings ──────────────────────────────────────────────────────────
output:
  default_resolution:
    width: 1920
    height: 1080
  fps: 24
  video_codec: "libx264"
  video_crf: 18              # 0=lossless, 51=worst, 18=high quality
  video_preset: "slow"       # ultrafast|fast|medium|slow|veryslow
  transition_duration_sec: 0.5
  transition_type: "fade"    # fade|wipe|dissolve|none
  ffmpeg_path: null          # null = use system PATH

# ─── Generation Defaults ──────────────────────────────────────────────────────
generation:
  default_genre: "cinematic"
  default_style: "photorealistic, dramatic lighting, film grain"
  default_aspect_ratio: "16:9"
  default_duration_sec: 60
  default_num_scenes: 3

  frame_generation:
    steps: 30
    cfg_scale: 7.0
    width: 1024
    height: 576
    sampler: "dpm_2_ancestral"
    scheduler: "karras"

  negative_prompt_default: "ugly, deformed, blurry, low quality, watermark, text, bad anatomy, extra limbs"

# ─── UI Settings ──────────────────────────────────────────────────────────────
ui:
  theme: "dark"
  language: "en"
  auto_preview: true
  show_advanced_settings: false

# ─── LLM Roles (pipeline cinematografica multi-LLM) ───────────────────────────
# Ogni ruolo puo usare un provider/modello diverso.
# Se non specificato, usa la config llm globale sopra.
llm_roles:
  story_analyst:
    provider: "lmstudio"
    model: "google/gemma-3n-e4b"
    api_key: "${ANTHROPIC_API_KEY}"
    temperature: 0.85
    max_tokens: 2000

  narrative_director:
    provider: "lmstudio"
    model: "google/gemma-3n-e4b"
    api_key: "${ANTHROPIC_API_KEY}"
    temperature: 0.70
    max_tokens: 4000

  cinematographer:
    provider: "lmstudio"
    model: "google/gemma-3n-e4b"
    api_key: "${OPENAI_API_KEY}"
    temperature: 0.55
    max_tokens: 6000

  prompt_engineer:
    provider: "lmstudio"
    model: "google/gemma-3n-e4b"
    api_key: "${OPENAI_API_KEY}"
    temperature: 0.65
    max_tokens: 8000

  continuity_checker:
    provider: "lmstudio"
    model: "google/gemma-3n-e4b"
    api_key: "${OPENAI_API_KEY}"
    temperature: 0.20
    max_tokens: 3000

# ─── LTX Director 2.3 (WhatDreamsCost ComfyUI plugin) ────────────────────────
# Set enabled: true once the following are installed in ComfyUI:
#   - LTX-Video 2.3 model files
#   - WhatDreamsCost custom node pack (provides LTXDirector, LTXDirectorGuide, etc.)
#
# mode:
#   "full_video" — generates the entire video in one LTX Director pass (recommended)
#                  requires first_frame + last_frame for every shot to be generated first
#   "per_shot"   — one LTX Director workflow per CinematicShot (more VRAM-friendly)
ltx_director:
  enabled: false
  mode: "full_video"              # "per_shot" | "full_video"

  # Model file names — must match exactly what is in ComfyUI's models/ folders
  checkpoint: "ltx-video-2b-v0.9.6.safetensors"
  clip_name1: "t5xxl_fp16.safetensors"
  clip_name2: ""
  video_vae: "ltx-video-vae-decode-v0.9.6.safetensors"
  audio_vae: "ltx-video-2b-v0.9.6.safetensors"
  upscale_model: "ltxv_spatial_upscaler_0.9.7.safetensors"
  lora_name: ""                   # empty = no LoRA applied
  lora_strength: 1.0

  # Sampling parameters
  stage1_steps: 8
  stage2_steps: 4
  cfg_scale: 1.0
  sampler: "euler"
  scheduler: "linear"
  denoise_stage1: 1.0
  denoise_stage2: 0.4

  # Output resolution and frame rate
  frame_rate: 24
  width: 1280
  height: 720
